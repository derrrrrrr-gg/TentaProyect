<div class="container">

  <header class="hero">
    <h1>🎬 CINEMA WORLD</h1>
    <p>Las mejores películas del momento</p>

    <button class="btn-agregar" (click)="abrirModal()">
      + Agregar Película
    </button>
  </header>

  <section class="movies-grid">

    <div class="movie-card" *ngFor="let pelicula of peliculas">

      <img [src]="pelicula.imagen" [alt]="pelicula.titulo">

      <div class="movie-info">
        <h2>{{ pelicula.titulo }}</h2>
        <p>{{ pelicula.genero }}</p>
      </div>

    </div>

  </section>

</div>

<!-- MODAL -->

<div class="modal-overlay" *ngIf="modalAbierto">

  <div class="modal">

    <h2>Agregar Película</h2>

    <input
      type="text"
      placeholder="Título"
      [(ngModel)]="nuevaPelicula.titulo"
    >

    <input
      type="text"
      placeholder="Género"
      [(ngModel)]="nuevaPelicula.genero"
    >

    <input
      type="text"
      placeholder="URL de imagen"
      [(ngModel)]="nuevaPelicula.imagen"
    >

    <div class="modal-buttons">
      <button class="guardar" (click)="agregarPelicula()">
        Guardar
      </button>

      <button class="cancelar" (click)="cerrarModal()">
        Cancelar
      </button>
    </div>

  </div>

</div>
